services:
  nginx:
    image: gogoshine/nginx:latest
    ports:
      - "80:80"
    environment:
      - LISTEN_PORT=80
      - SERVER_NAME=localhost
      - PROXY_TIMEOUT=600
      - PROXY_PASS_URL_1=http://127.0.0.1:30000/openapi/capcut-mate/
      - PROXY_LOCATION_1=/openapi/capcut-mate/
      - PROXY_PASS_URL_2=http://127.0.0.1:30001/openapi/autosubrt/
      - PROXY_LOCATION_2=/openapi/autosubrt/
    volumes:
      - ./html:/usr/share/nginx/html
    restart: unless-stopped
    container_name: nginx